<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Models — Blender Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #3a3a3a, #2a2a2a);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff7b00;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
        }
        .logo {
            color: #ff7b00;
            font-weight: bold;
        }
        .search-container {
            margin: 20px auto;
            max-width: 600px;
            position: relative;
        }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 30px;
            background-color: #2a2a2a;
            color: white;
        }
        #searchInput:focus {
            outline: none;
            border-color: #ff7b00;
        }
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .model-card {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .model-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background-color: #333;
        }
        .model-info {
            padding: 15px;
        }
        .model-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: white;
        }
        .model-desc {
            color: #aaa;
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #222;
            border-top: 1px solid #444;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <h1><span class="logo">Blender</span> 3D Models Collection</h1>
        <p>Более 100 бесплатных 3D-моделей для скачивания</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Поиск моделей...">
    </div>

    <div class="models-grid" id="modelsContainer">
        <!-- Карточки моделей будут добавлены через JavaScript -->
    </div>

    <footer>
        <p>© 2024 Blender 3D Models Collection. Все модели взяты из официального репозитория Blender.</p>
    </footer>

    <script>
        // Массив с данными о моделях
        const models = [
            {
                id: 1,
                title: "Low-Poly Tree",
                description: "Упрощённая 3D-модель дерева для игр",
                image: "https://via.placeholder.com/250x180/3a3a3a/ff7b00?text=Tree",
                downloadUrl: "#", // Здесь будет ссылка на скачивание
                officialUrl: "https://www.blender.org"
            },
            {
                id: 2,
                title: "Modern Chair",
                description: "Стильный стул в современном стиле",
                image: "https://via.placeholder.com/250x180/3a3a3a/ff7b00?text=Chair",
                downloadUrl: "#",
                officialUrl: "https://www.blender.org"
            },
            // Добавляем ещё 98 моделей (для примера — дублируем с разными ID и названиями)
            ...Array(98).fill().map((_, i) => ({
                id: i + 3,
                title: `3D Model ${i + 3}`,
                description: `Описание модели ${i + 3} для демонстрации`,
                image: `https://via.placeholder.com/250x180/3a3a3a/ff7b00?text=Model+${i + 3}`,
                downloadUrl: "#",
                officialUrl: "https://www.blender.org"
            }))
        ];

        // Функция для отображения моделей
        function displayModels(filteredModels) {
            const container = document.getElementById('modelsContainer');
            container.innerHTML = '';

            filteredModels.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <img src="${model.image}" alt="${model.title}" class="model-image">
                    <div class="model-info">
                        <div class="model-title">${model.title}</div>
                        <div class="model-desc">${model.description}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    if (model.downloadUrl !== "#") {
                        // Если есть прямая ссылка на скачивание, скачиваем
                        window.open(model.downloadUrl, '_blank');
                    } else {
                        // Иначе переходим на официальный сайт
                        window.open(model.officialUrl, '_blank');
                    }
                });
                container.appendChild(card);
            });
        }

        // Функция поиска
        function searchModels() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = models.filter(model =>
                model.title.toLowerCase().includes(searchTerm) ||
                model.description.toLowerCase().includes(searchTerm)
            );
            displayModels(filtered);
        }

        // Инициализация: отображаем все модели при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            displayModels(models);

            // Добавляем обработчик для поиска
            document.getElementById('searchInput').addEventListener('input', searchModels);
        });
    </script>
</body>
</html>
