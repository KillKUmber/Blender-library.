<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender Model Market - 100+ Models</title>
    <style>
        :root {
            --bg-main: #1d1d1d;
            --bg-card: #2b2b2b;
            --bg-search: #3d3d3d;
            --text-main: #e0e0e0;
            --text-muted: #909090;
            --accent: #e58723; /* Фирменный оранжевый Blender */
            --accent-hover: #ff9f3b;
            --like-color: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        /* Логотип + Название */
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .blender-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        header h1 {
            font-size: 2.5rem;
            color: #fff;
        }

        header h1 span {
            color: var(--accent);
        }

        /* Панель управления (Поиск + Загрузка) */
        .controls-panel {
            max-width: 700px;
            margin: 20px auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex-grow: 1;
            min-width: 280px;
            padding: 12px 20px;
            background-color: var(--bg-search);
            border: 2px solid transparent;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        /* Кнопка добавления картинки */
        .upload-btn-label {
            background-color: #4a4a4a;
            color: #fff;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upload-btn-label:hover {
            background-color: #5a5a5a;
        }

        #uploadInput {
            display: none;
        }

        /* Сетка карточек */
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Карточка */
        .model-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .model-card:hover {
            transform: translateY(-3px);
        }

        /* Блок для сгенерированной картинки */
        .model-image-box {
            width: 100%;
            height: 220px;
            background: #1a1a1a;
            overflow: hidden;
            position: relative;
            display: block;
        }

        .model-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .model-card:hover .model-image {
            transform: scale(1.04);
        }

        .model-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .model-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
            text-decoration: none;
            transition: color 0.2s;
            display: inline-block;
        }

        .model-title:hover {
            color: var(--accent);
        }

        /* Лайки и комменты */
        .interaction-bar {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .like-btn:hover, .like-btn.liked {
            color: var(--like-color);
        }

        .comment-btn:hover {
            color: #3498db;
        }

        /* Блок комментариев */
        .comments-section {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 15px;
            display: none;
        }

        .comments-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #ccc;
            list-style: none;
        }

        .comments-list li {
            padding: 4px 0;
            border-bottom: 1px solid #3a3a3a;
        }

        .comment-input-block {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .comment-input {
            flex-grow: 1;
            padding: 6px;
            background: var(--bg-search);
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            font-size: 0.85rem;
        }

        .send-comment-btn {
            background: #555;
            border: none;
            color: #fff;
            padding: 0 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .send-comment-btn:hover {
            background: var(--accent);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4px 0;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Blender_logo_no_text.svg" alt="Blender Logo" class="blender-logo">
            <h1>Blender <span>Hub</span></h1>
        </div>
        <p>Кликните на название или картинку модели, чтобы перейти к скачиванию на страницу Blender</p>
        
        <div class="controls-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="Быстрый поиск по названию...">
            
            <label class="upload-btn-label" for="uploadInput">
                <span>➕ Добавить свою картинку</span>
            </label>
            <input type="file" id="uploadInput" accept="image/*">
        </div>
    </header>

    <main class="models-grid" id="modelsGrid">
        <div class="no-results" id="noResults">Модели не найдены :(</div>
    </main>

    <script>
        // Функция автоматической генерации красивой картинки-заглушки (в стиле абстрактного 3D-рендера)
        function generateProceduralImage(title, seed) {
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 280;
            const ctx = canvas.getContext('2d');

            // Создаем темный градиент для фона
            const bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            const hue = (seed * 45) % 360;
            bgGrad.addColorStop(0, '#141414');
            bgGrad.addColorStop(1, `hsl(${hue}, 30%, 15%)`);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем сетку 3D пространства (как во вьюпорте Blender)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            // Рисуем абстрактную геометрическую фигуру ("модель")
            ctx.fillStyle = `hsl(${(hue + 40) % 360}, 75%, 50%)`;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${(hue + 40) % 360}, 75%, 50%)`;

            ctx.beginPath();
            // Генерируем форму на основе синусов/косинусов
            ctx.moveTo(canvas.width/2 + Math.cos(seed)*60, canvas.height/2 + Math.sin(seed)*60);
            for(let step = 1; step <= 5; step++) {
                let angle = (step * (Math.PI * 2) / 5) + seed;
                let x = canvas.width/2 + Math.cos(angle) * 70;
                let y = canvas.height/2 + Math.sin(angle) * 70;
                ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Сбрасываем тени
            ctx.shadowBlur = 0;

            // Накладываем легкий текст-пометку в угол
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.font = '12px Segoe UI';
            ctx.fillText("RENDER_PREVIEW", 20, 35);

            return canvas.toDataURL('image/png');
        }

        // Базовые заготовки для создания 100 уникальных моделей
        const initialModels = [
            { title: "Сузанна и гео-ноды (Сцена с обезьяной)", section: "#geometry-nodes", likes: 142, comments: ["Классический тест!", "Гео-ноды настроены шикарно."] },
            { title: "Спортивный Киберпанк Автомобиль (Сцена Charge)", section: "#charge", likes: 389, comments: ["Машина из фильма!", "Текстуры просто огонь."] },
            { title: "Стилизованный Фэнтези Персонаж (Sprite Fright)", section: "#sprite-fright", likes: 95, comments: ["Отличный риггинг тела."] },
            { title: "Существо Квадрокоптер (Сцена Крабо-дрон)", section: "#animation", likes: 210, comments: ["Анимация супер."] },
            { title: "Уютный лофт интерьер (Рендер Cycles)", section: "#cycles", likes: 64, comments: ["Свет реалистичный."] },
            { title: "Архитектурный павильон (Сцена Барселона)", section: "#eevee", likes: 112, comments: ["Для теста EEVEE."] }
        ];

        // Добавляем модели до 100 штук
        const names = ["Космический корабль", "Древний замок", "Мощный Двигатель", "Катана самурая", "Шлем штурмовика", "Монстр Ктулху", "Механический Робот", "Низкополигональное дерево", "Футуристичный бластер", "Кристалл энергии"];
        const sections = ["#cycles", "#eevee", "#geometry-nodes", "#animation", "#grease-pencil"];

        const allModels = [];

        // Сначала пушим первые детальные модели
        initialModels.forEach((m, idx) => {
            allModels.push({
                title: m.title,
                imgUrl: generateProceduralImage(m.title, idx + 1),
                downloadUrl: `https://www.blender.org/download/demo-files/${m.section}`,
                likes: m.likes,
                comments: m.comments,
                liked: false
            });
        });

        // Заполняем оставшиеся до 100
        for (let i = 0; i < 94; i++) {
            const currentName = `${names[i % names.length]} (Модель ${i + 1})`;
            const randomSection = sections[i % sections.length];
            allModels.push({
                title: currentName,
                imgUrl: generateProceduralImage(currentName, i + 10),
                downloadUrl: `https://www.blender.org/download/demo-files/${randomSection}`,
                likes: Math.floor(Math.random() * 50) + 5,
                comments: ["Хороший концепт для сцены."],
                liked: false
            });
        }

        const grid = document.getElementById('modelsGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const uploadInput = document.getElementById('uploadInput');

        // Функция отрисовки карточек
        function render(models) {
            const oldCards = grid.querySelectorAll('.model-card');
            oldCards.forEach(c => c.remove());

            if(models.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            models.forEach((model) => {
                // Ищем оригинальный индекс в главном массиве allModels, чтобы лайки/комменты сохранялись правильно
                const originalIndex = allModels.findIndex(m => m.title === model.title);
                const card = document.createElement('div');
                card.className = 'model-card';
                
                const commentsHTML = model.comments.map(c => `<li>${c}</li>`).join('');

                card.innerHTML = `
                    <a href="${model.downloadUrl}" target="_blank" class="model-image-box">
                        <img src="${model.imgUrl}" alt="${model.title}" class="model-image">
                    </a>
                    
                    <div class="model-info">
                        <a href="${model.downloadUrl}" target="_blank" class="model-title">${model.title}</a>
                        
                        <div class="interaction-bar">
                            <button class="like-btn ${model.liked ? 'liked' : ''}" onclick="toggleLike(${originalIndex})">
                                ❤️ <span class="like-count">${model.likes}</span>
                            </button>
                            <button class="comment-btn" onclick="toggleComments(${originalIndex})">
                                💬 <span>${model.comments.length}</span>
                            </button>
                        </div>

                        <div class="comments-section" id="comments-${originalIndex}">
                            <ul class="comments-list">${commentsHTML}</ul>
                            <div class="comment-input-block">
                                <input type="text" class="comment-input" id="input-${originalIndex}" placeholder="Ваш комментарий...">
                                <button class="send-comment-btn" onclick="addComment(${originalIndex})">➔</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Логика лайков
        window.toggleLike = function(index) {
            const model = allModels[index];
            if(model.liked) {
                model.likes--;
                model.liked = false;
            } else {
                model.likes++;
                model.liked = true;
            }
            render(getCurrentFilteredList());
        }

        // Показать/скрыть комментарии
        window.toggleComments = function(index) {
            const section = document.getElementById(`comments-${index}`);
            section.style.display = section.style.display === 'block' ? 'none' : 'block';
        }

        // Добавить комментарий
        window.addComment = function(index) {
            const input = document.getElementById(`input-${index}`);
            const text = input.value.trim();
            if(text) {
                allModels[index].comments.push(text);
                render(getCurrentFilteredList());
                document.getElementById(`comments-${index}`).style.display = 'block';
            }
        }

        function getCurrentFilteredList() {
            const text = searchInput.value.toLowerCase().trim();
            return allModels.filter(m => m.title.toLowerCase().includes(text));
        }

        // Быстрый поиск
        searchInput.addEventListener('input', () => {
            render(getCurrentFilteredList());
        });

        // Загрузка пользовательского изображения
        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newModel = {
                        title: file.name.split('.')[0] || "Моё изображение",
                        imgUrl: event.target.result, 
                        downloadUrl: "https://www.blender.org/download/demo-files/",
                        likes: 0,
                        comments: ["Вы загрузили эту картинку!"],
                        liked: false
                    };
                    allModels.unshift(newModel);
                    render(getCurrentFilteredList());
                };
                reader.readAsDataURL(file);
            }
        });

        // Запуск
        render(allModels);
    </script>
</body>
</html>
