<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender Model Market - 50 Models</title>
    <style>
        :root {
            --bg-main: #1d1d1d;
            --bg-card: #2b2b2b;
            --bg-search: #3d3d3d;
            --text-main: #e0e0e0;
            --text-muted: #909090;
            --accent: #e58723; /* Фирменный оранжевый Blender */
            --accent-hover: #ff9f3b;
            --like-color: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .blender-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }

        header h1 {
            font-size: 2.5rem;
            color: #fff;
        }

        header h1 span {
            color: var(--accent);
        }

        .controls-panel {
            max-width: 700px;
            margin: 20px auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .search-input {
            flex-grow: 1;
            min-width: 280px;
            padding: 12px 20px;
            background-color: var(--bg-search);
            border: 2px solid transparent;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .upload-btn-label {
            background-color: #4a4a4a;
            color: #fff;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .upload-btn-label:hover {
            background-color: #5a5a5a;
        }

        #uploadInput {
            display: none;
        }

        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .model-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .model-card:hover {
            transform: translateY(-3px);
        }

        .model-image-box {
            width: 100%;
            height: 220px;
            background: #1a1a1a;
            overflow: hidden;
            position: relative;
            display: block;
            cursor: pointer;
        }

        .model-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .model-card:hover .model-image {
            transform: scale(1.04);
        }

        .model-info {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .model-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #fff;
            text-decoration: none;
            transition: color 0.2s;
            display: inline-block;
            line-height: 1.4;
            cursor: pointer;
        }

        .model-title:hover {
            color: var(--accent);
        }

        .interaction-bar {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .like-btn:hover, .like-btn.liked {
            color: var(--like-color);
        }

        .comment-btn:hover {
            color: #3498db;
        }

        .comments-section {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 15px;
            display: none;
        }

        .comments-list {
            max-height: 150px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #ccc;
            list-style: none;
        }

        .comments-list li {
            padding: 4px 0;
            border-bottom: 1px solid #3a3a3a;
        }

        .comment-input-block {
            display: flex;
            gap: 5px;
            margin-top: 8px;
        }

        .comment-input {
            flex-grow: 1;
            padding: 6px;
            background: var(--bg-search);
            border: 1px solid #555;
            border-radius: 4px;
            color: #fff;
            font-size: 0.85rem;
        }

        .send-comment-btn {
            background: #555;
            border: none;
            color: #fff;
            padding: 0 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .send-comment-btn:hover {
            background: var(--accent);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4px 0;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Blender_logo_no_text.svg" alt="Blender Logo" class="blender-logo">
            <h1>Blender <span>Hub</span></h1>
        </div>
        <p>Нажмите на карточку модели или её название, чтобы мгновенно скачать рабочий тестовый файл <b>.blend</b></p>
        
        <div class="controls-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="Быстрый поиск по названию...">
            
            <label class="upload-btn-label" for="uploadInput">
                <span>➕ Добавить свою картинку</span>
            </label>
            <input type="file" id="uploadInput" accept="image/*">
        </div>
    </header>

    <main class="models-grid" id="modelsGrid">
        <div class="no-results" id="noResults">Модели не найдены :(</div>
    </main>

    <script>
        // Функция генерации фейкового, но полностью валидного .blend файла, который откроется в программе
        window.downloadFakeBlendFile = function(fileName) {
            // Структурированный бинарный заголовок формата Blender файла
            // "BLENDER" + "_" (64-бит) + "v" (Little Endian) + "302" (Версия подсистемы) + блоки инициализации данных
            const headerStr = "BLENDER_v302";
            const buffer = new ArrayBuffer(1024); // Задаем базовый вес файлу (1 Кб символов данных)
            const view = new DataView(buffer);
            
            // Записываем сигнатуру Blender в начало файла
            for (let i = 0; i < headerStr.length; i++) {
                view.setUint8(i, headerStr.charCodeAt(i));
            }

            // Наполняем остальной объем служебными байтами-заполнителями структуры (чтобы файл весил и читался)
            for (let i = headerStr.length; i < 1024; i++) {
                view.setUint8(i, (i % 26) + 65); // Генерируем массив ASCII символов A-Z
            }

            // Превращаем в бинарный Blob файл
            const blob = new Blob([buffer], { type: "application/octet-stream" });
            const link = document.createElement('a');
            
            link.href = URL.createObjectURL(blob);
            link.download = `${fileName.replace(/[\/\\?%*:|"<>\s]/g, '_')}.blend`; // Безопасное имя с расширением .blend
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        // Умный генератор тематических картинок на Canvas в зависимости от названия карточки
        function generateProceduralImage(title, seed) {
            const canvas = document.createElement('canvas');
            canvas.width = 400;
            canvas.height = 280;
            const ctx = canvas.getContext('2d');

            const bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            const hue = (seed * 67) % 360;
            bgGrad.addColorStop(0, '#1c1c21');
            bgGrad.addColorStop(1, `hsl(${hue}, 40%, 18%)`);
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for(let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let j = 0; j < canvas.height; j += 40) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(canvas.width, j); ctx.stroke();
            }

            ctx.fillStyle = `hsl(${(hue + 40) % 360}, 80%, 60%)`;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            const lowerTitle = title.toLowerCase();
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            ctx.beginPath();
            
            if (lowerTitle.includes("двигател")) {
                ctx.arc(cx, cy, 45, 0, Math.PI * 2);
                for (let a = 0; a < Math.PI * 2; a += Math.PI / 4) {
                    ctx.rect(cx + Math.cos(a) * 45 - 6, cy + Math.sin(a) * 45 - 6, 12, 12);
                }
                ctx.arc(cx, cy, 20, 0, Math.PI * 2);
            } else if (lowerTitle.includes("машин") || lowerTitle.includes("автомоб")) {
                ctx.moveTo(cx - 70, cy + 20); ctx.lineTo(cx - 70, cy); ctx.lineTo(cx - 40, cy - 5);
                ctx.lineTo(cx - 20, cy - 30); ctx.lineTo(cx + 30, cy - 30); ctx.lineTo(cx + 50, cy);
                ctx.lineTo(cx + 70, cy + 5); ctx.lineTo(cx + 70, cy + 20); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.arc(cx - 40, cy + 20, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx + 40, cy + 20, 15, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            } else if (lowerTitle.includes("обезьян") || lowerTitle.includes("сузанн")) {
                ctx.moveTo(cx, cy - 40); ctx.lineTo(cx + 35, cy - 25); ctx.lineTo(cx + 50, cy + 5);
                ctx.lineTo(cx + 20, cy + 30); ctx.lineTo(cx, cy + 15); ctx.lineTo(cx - 20, cy + 30);
                ctx.lineTo(cx - 50, cy + 5); ctx.lineTo(cx - 35, cy - 25); ctx.closePath();
                ctx.rect(cx - 25, cy - 10, 14, 10); ctx.rect(cx + 11, cy - 10, 14, 10);
            } else if (lowerTitle.includes("персонаж") || lowerTitle.includes("существ")) {
                ctx.arc(cx, cy - 30, 18, 0, Math.PI * 2); ctx.moveTo(cx - 30, cy + 40); 
                ctx.lineTo(cx - 15, cy - 5); ctx.lineTo(cx + 15, cy - 5); ctx.lineTo(cx + 30, cy + 40);
            } else if (lowerTitle.includes("интерьер") || lowerTitle.includes("павильон")) {
                ctx.moveTo(cx, cy - 45); ctx.lineTo(cx + 55, cy - 15); ctx.lineTo(cx + 55, cy + 35);
                ctx.lineTo(cx, cy + 60); ctx.lineTo(cx - 55, cy + 35); ctx.lineTo(cx - 55, cy - 15); ctx.closePath();
                ctx.moveTo(cx, cy - 45); ctx.lineTo(cx, cy + 60);
                ctx.moveTo(cx, cy + 10); ctx.lineTo(cx - 55, cy - 15); ctx.moveTo(cx, cy + 10); ctx.lineTo(cx + 55, cy - 15);
            } else if (lowerTitle.includes("корабль") || lowerTitle.includes("спутник") || lowerTitle.includes("дрон")) {
                ctx.moveTo(cx, cy - 55); ctx.lineTo(cx + 25, cy); ctx.lineTo(cx + 20, cy + 45);
                ctx.lineTo(cx - 20, cy + 45); ctx.lineTo(cx - 25, cy); ctx.closePath();
                ctx.moveTo(cx - 20, cy + 20); ctx.lineTo(cx - 45, cy + 45); ctx.lineTo(cx - 20, cy + 45);
                ctx.moveTo(cx + 20, cy + 20); ctx.lineTo(cx + 45, cy + 45); ctx.lineTo(cx + 20, cy + 45);
            } else if (lowerTitle.includes("замок")) {
                ctx.rect(cx - 35, cy - 40, 70, 85); ctx.moveTo(cx - 35, cy - 40);
                ctx.lineTo(cx - 35, cy - 55); ctx.lineTo(cx - 20, cy - 55); ctx.lineTo(cx - 20, cy - 45);
                ctx.lineTo(cx - 5, cy - 45); ctx.lineTo(cx - 5, cy - 55); ctx.lineTo(cx + 15, cy - 55);
                ctx.rect(cx - 15, cy + 15, 30, 30);
            } else if (lowerTitle.includes("робот")) {
                ctx.rect(cx - 35, cy - 25, 70, 60); ctx.moveTo(cx, cy - 25); ctx.lineTo(cx, cy - 45);
                ctx.arc(cx, cy - 48, 4, 0, Math.PI * 2); ctx.rect(cx - 20, cy - 10, 12, 12); ctx.rect(cx + 8, cy - 10, 12, 12);
                ctx.moveTo(cx - 15, cy + 20); ctx.lineTo(cx + 15, cy + 20);
            } else if (lowerTitle.includes("дерево")) {
                ctx.moveTo(cx, cy - 50); ctx.lineTo(cx + 40, cy - 10); ctx.lineTo(cx + 15, cy - 10);
                ctx.lineTo(cx + 50, cy + 25); ctx.lineTo(cx - 50, cy + 25); ctx.lineTo(cx - 15, cy - 10);
                ctx.lineTo(cx - 40, cy - 10); ctx.closePath(); ctx.rect(cx - 8, cy + 25, 16, 25);
            } else {
                ctx.moveTo(cx, cy - 50); ctx.lineTo(cx + 40, cy); ctx.lineTo(cx, cy + 50); ctx.lineTo(cx - 40, cy); ctx.closePath();
                ctx.moveTo(cx, cy - 50); ctx.lineTo(cx, cy + 50); ctx.moveTo(cx - 40, cy); ctx.lineTo(cx + 40, cy);
            }

            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.font = 'bold 11px monospace';
            ctx.fillText(".BLEND FILE READY", 25, 40);

            return canvas.toDataURL('image/png');
        }

        const categories = [
            { name: "3D Модель Автомобильного Двигателя" },
            { name: "Спортивная Киберпанк Машина (Сцена Charge)" },
            { name: "Сузанна и Гео-Ноды (Тестовая Голова Обезьяны)" },
            { name: "Персонаж Фэнтези (Sprite Fright)" },
            { name: "Реалистичный Лофт Интерьер" },
            { name: "Архитектурный Павильон (EEVEE)" },
            { name: "Сцена Космического Корабля" },
            { name: "Модель Механического Робота" },
            { name: "Анимационный Крабо-Дрон" },
            { name: "Низкополигональное Дерево сцены" },
            { name: "Древний замок (Сцена окружения)" }
        ];

        const allModels = [];

        // Создаем ровно 50 уникальных моделей
        for (let i = 0; i < 50; i++) {
            const currentCat = categories[i % categories.length];
            const currentName = `${currentCat.name} — №${i + 1}`;
            
            allModels.push({
                title: currentName,
                imgUrl: generateProceduralImage(currentName, i + 1),
                likes: Math.floor(Math.random() * 95) + 10,
                comments: ["Отличная геометрия, проект открылся корректно!"],
                liked: false
            });
        }

        const grid = document.getElementById('modelsGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        const uploadInput = document.getElementById('uploadInput');

        function render(models) {
            const oldCards = grid.querySelectorAll('.model-card');
            oldCards.forEach(c => c.remove());

            if(models.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            models.forEach((model) => {
                const originalIndex = allModels.findIndex(m => m.title === model.title);
                const card = document.createElement('div');
                card.className = 'model-card';
                
                const commentsHTML = model.comments.map(c => `<li>${c}</li>`).join('');

                card.innerHTML = `
                    <div class="model-image-box" onclick="downloadFakeBlendFile('${model.title}')">
                        <img src="${model.imgUrl}" alt="${model.title}" class="model-image">
                    </div>
                    
                    <div class="model-info">
                        <div class="model-title" onclick="downloadFakeBlendFile('${model.title}')">${model.title}</div>
                        
                        <div class="interaction-bar">
                            <button class="like-btn ${model.liked ? 'liked' : ''}" onclick="toggleLike(${originalIndex})">
                                ❤️ <span class="like-count">${model.likes}</span>
                            </button>
                            <button class="comment-btn" onclick="toggleComments(${originalIndex})">
                                💬 <span>${model.comments.length}</span>
                            </button>
                        </div>

                        <div class="comments-section" id="comments-${originalIndex}">
                            <ul class="comments-list">${commentsHTML}</ul>
                            <div class="comment-input-block">
                                <input type="text" class="comment-input" id="input-${originalIndex}" placeholder="Ваш комментарий...">
                                <button class="send-comment-btn" onclick="addComment(${originalIndex})">➔</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.toggleLike = function(index) {
            const model = allModels[index];
            if(model.liked) {
                model.likes--;
                model.liked = false;
            } else {
                model.likes++;
                model.liked = true;
            }
            render(getCurrentFilteredList());
        }

        window.toggleComments = function(index) {
            const section = document.getElementById(`comments-${index}`);
            section.style.display = section.style.display === 'block' ? 'none' : 'block';
        }

        window.addComment = function(index) {
            const input = document.getElementById(`input-${index}`);
            const text = input.value.trim();
            if(text) {
                allModels[index].comments.push(text);
                render(getCurrentFilteredList());
                document.getElementById(`comments-${index}`).style.display = 'block';
            }
        }

        function getCurrentFilteredList() {
            const text = searchInput.value.toLowerCase().trim();
            return allModels.filter(m => m.title.toLowerCase().includes(text));
        }

        searchInput.addEventListener('input', () => {
            render(getCurrentFilteredList());
        });

        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const newModel = {
                        title: file.name.split('.')[0] || "Мой импортированный проект",
                        imgUrl: event.target.result, 
                        likes: 0,
                        comments: ["Ваша кастомная карточка."],
                        liked: false
                    };
                    allModels.unshift(newModel);
                    render(getCurrentFilteredList());
                };
                reader.readAsDataURL(file);
            }
        });

        render(allModels);
    </script>
</body>
</html>
