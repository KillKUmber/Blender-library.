<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blender Model Market - 100+ Free 3D Models</title>
    <style>
        /* Базовые настройки в стиле Blender UI */
        :root {
            --bg-main: #1d1d1d;
            --bg-card: #2b2b2b;
            --bg-search: #3d3d3d;
            --text-main: #e0e0e0;
            --text-muted: #909090;
            --accent: #e58723; /* Фирменный оранжевый Blender */
            --accent-hover: #ff9f3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
        }

        header h1 span {
            color: var(--accent);
        }

        /* Поисковая строка */
        .search-container {
            max-width: 500px;
            margin: 20px auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--bg-search);
            border: 2px solid transparent;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        /* Сетка для 100 моделей */
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Карточка модели */
        .model-card {
            background-color: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(229, 135, 35, 0.2);
        }

        /* Превью картинки (заглушка, если нет своих PNG) */
        .model-image-box {
            width: 100%;
            height: 180px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .model-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Инфо внутри карточки */
        .model-info {
            padding: 15px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .model-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .model-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 15px;
        }

        /* Кнопка скачивания */
        .download-btn {
            margin-top: auto;
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Сообщение, если ничего не найдено */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4px 0;
            color: var(--text-muted);
            font-size: 1.2rem;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Blender <span>Models</span> Archive</h1>
        <p>Скачивайте бесплатные 3D-модели для ваших проектов</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Быстрый поиск модели по названию...">
        </div>
    </header>

    <main class="models-grid" id="modelsGrid">
        <div class="no-results" id="noResults">Модели с таким названием не найдены :(</div>
    </main>

    <script>
        // Список категорий для генерации разнообразных названий
        const categories = ["Character", "Sci-Fi Weapon", "Cyberpunk Car", "Low-Poly Tree", "Medieval Sword", "Futuristic Helmet", "Interior Chair", "Monster", "Spaceship", "Robot Drone"];
        
        const grid = document.getElementById('modelsGrid');
        const searchInput = document.getElementById('searchInput');
        const noResults = document.getElementById('noResults');
        
        // Массив для хранения данных о 100 моделях
        const modelsData = [];

        // 1. Генерируем базу данных из 100 моделей
        for (let i = 1; i <= 100; i++) {
            const randomCategory = categories[Math.floor(Math.random() * categories.length)];
            const title = `${randomCategory} #${i}`;
            
            // В реальном проекте замени пути ниже на свои файлы, например: `images/model_${i}.png` и `files/model_${i}.blend`
            // Сейчас используются красивые картинки-заглушки (picsum)
            const imgUrl = `https://picsum.photos/seed/${i + 10}/300/200`; 
            const downloadUrl = `#`; 

            modelsData.push({ id: i, title: title, img: imgUrl, download: downloadUrl });
        }

        // 2. Функция рендеринга карточек на страницу
        function renderModels(models) {
            // Удаляем старые карточки (кроме сообщения "не найдено")
            const cards = grid.querySelectorAll('.model-card');
            cards.forEach(card => card.remove());

            if (models.length === 0) {
                noResults.style.display = 'block';
                return;
            } else {
                noResults.style.display = 'none';
            }

            // Создаем HTML для каждой модели
            models.forEach(model => {
                const card = document.createElement('div');
                card.className = 'model-card';
                card.innerHTML = `
                    <div class="model-image-box">
                        <img src="${model.img}" alt="${model.title}" class="model-image" loading="lazy">
                    </div>
                    <div class="model-info">
                        <div class="model-title">${model.title}</div>
                        <div class="model-meta">Формат: .blend / .fbx</div>
                        <a href="${model.download}" class="download-btn" download>Скачать (.blend)</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Первоначальный вывод всех 100 моделей
        renderModels(modelsData);

        // 3. Логика быстрого поиска
        searchInput.addEventListener('input', (e) => {
            const searchText = e.target.value.toLowerCase().trim();
            
            // Фильтруем массив по вхождению текста в название
            const filteredModels = modelsData.filter(model => {
                return model.title.toLowerCase().includes(searchText);
            });

            // Перерисовываем только подходящие карточки
            renderModels(filteredModels);
        });
    </script>
</body>
</html>
