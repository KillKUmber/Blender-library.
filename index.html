<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Blender Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0b0f16;
            color: #eef2ff;
            padding: 20px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            color: #ffffff;
        }
        h1 span { color: #ff8c42; }
        .sub {
            text-align: center;
            color: #9aa4bf;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 8px;
            max-width: 500px;
            margin: 0 auto 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-box input {
            flex: 1;
            min-width: 180px;
            padding: 10px 16px;
            border: 2px solid #2a3140;
            border-radius: 30px;
            background: #12171f;
            color: #fff;
            font-size: 16px;
        }
        .search-box input:focus { border-color: #ff8c42; outline: none; }
        .search-box input::placeholder { color: #6b768f; }
        .search-box button {
            padding: 10px 20px;
            background: #ff8c42;
            border: none;
            border-radius: 30px;
            color: #0b0f16;
            font-weight: 700;
            cursor: pointer;
        }
        .search-box button:hover { background: #e6731a; }
        .search-box .clear {
            background: #2a3140;
            color: #ccc;
        }
        .search-box .clear:hover { background: #3a4150; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: #12171f;
            border: 1px solid #2a3140;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.2s;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-4px);
            border-color: #ff8c42;
            box-shadow: 0 8px 20px rgba(255,140,66,0.2);
        }
        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-bottom: 2px solid #ff8c42;
            background: #0b0f16;
            display: block;
        }
        .card-info {
            padding: 12px;
        }
        .card-name {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .card-cat {
            font-size: 0.7rem;
            color: #ff8c42;
            text-transform: uppercase;
            font-weight: 600;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #6b768f;
            grid-column: 1/-1;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            border-top: 2px solid #2a3140;
            color: #6b768f;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
