<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Models — Blender Collection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e1e;
            color: #e0e0e0;
            line-height: 1.6;
        }
        header {
            background: linear-gradient(135deg, #3a3a3a, #2a2a2a);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff7b00;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .logo {
            width: 50px;
            height: 50px;
        }
        h1 {
            color: white;
            font-size: 2.5rem;
        }
        .logo-text {
            color: #ff7b00;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .search-container {
            flex: 1;
            margin-right: 10px;
            position: relative;
        }
        #searchInput {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 30px;
            background-color: #2a2a2a;
            color: white;
        }
        #searchInput:focus {
            outline: none;
            border-color: #ff7b00;
        }
        .upload-btn {
            background-color: #ff7b00;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .models-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .model-card {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .model-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }
        .model-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background-color: #333;
        }
        .model-info {
            padding: 15px;
        }
        .model-title {
            font-weight: bold;
            margin-bottom: 5px;
            color: white;
            font-size: 1.2rem;
        }
        .model-desc {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        .model-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .like-btn, .comment-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .like-btn:hover, .comment-btn:hover {
            color: #ff7b00;
        }
        .liked {
            color: #ff7b00 !important;
        }
        .comments-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .close-modal {
            float: right;
            font-size: 1.5rem;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #222;
            border-top: 1px solid #444;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f4/Blender_logo_no_text.svg/220px-Blender_logo_no_text.svg.png" alt="Blender Logo" class="logo">
        <h1><span class="logo-text">Blender</span> 3D Models Collection</h1>
    </header>

    <div class="controls">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Поиск моделей...">
        </div>
        <button class="upload-btn" onclick="document.getElementById('fileUpload').click()">Добавить модель</button>
        <input type="file" id="fileUpload" style="display:none;" accept="image/*">
    </div>

    <div class="models-grid" id="modelsContainer">
        <!-- Карточки моделей будут добавлены через JavaScript -->
    </div>

    <!-- Модальное окно для комментариев -->
    <div class="comments-modal" id="commentsModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCommentsModal()">&times;</span>
            <h3 id="modalTitle"></h3>
            <div id="commentsList"></div>
            <div style="margin-top: 20px;">
                <textarea id="newComment" rows="3" style="width:100%; background:#333; color:white; border:1px solid #444; padding:10px;" placeholder="Ваш комментарий..."></textarea>
                <button onclick="addComment()" style="margin-top:10px; background:#ff7b00; color:white; border:none; padding:8px 15px; border-radius:5px;">Добавить комментарий</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2024 Blender 3D Models Collection. Все модели взяты из официального репозитория Blender.</p>
    </footer>
